<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storytelling App</title>
    <link rel="stylesheet" href="Css/style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Irish+Grover&family=Itim&family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="sub-title">
      <a href="index.html">
        <h1>Ruku's StoryBooks</h1>
      </a>
    </div>

    <div class="upper">
      <div class="cover-image">
        <img src="" alt="Story cover" class="story-cover" id="story-cover" />
      </div>
      <div class="story-info">
        <h2 class="story-title" id="story-title">Story Title</h2>
        <p class="story-author" id="story-author">Author: Rukuru</p>
        <a href="#" id="start-reading-btn"
          ><button class="btn">Read Now -></button></a
        >
      </div>
    </div>

    <div class="description">
      <h2 class="description-title">Description</h2>
      <p class="story-description" id="story-description">
        Story description goes here. This is a brief summary of the story to
        give readers an idea of what the story is about before they start
        reading.
      </p>
    </div>

    <footer>
      <a href="index.html"
        ><span class="small-title">Ruku's Books</span> &copy;</a
      >
      <div class="links">
        <a href="about.html">About</a>
        <a href="mailto:harrissardar77@gmail.com">Contact Us</a>
      </div>
    </footer>

    <script src="Js/description.js"></script>
  </body>
</html>
